<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>NFT Market</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', sans-serif;
        }
        body {
            background: #0b0e14;
            color: white;
        }
        .navbar {
            display: flex;
            gap: 12px;
            padding: 16px 40px;
            background: #0f121a;
            border-bottom: 1px solid #1e2a2f;
            flex-wrap: wrap;
        }
        .logo {
            font-size: 20px;
            font-weight: 700;
            color: #24ffa4;
            margin-right: auto;
        }
        .nav-btn {
            background: transparent;
            border: none;
            color: #b0b8c5;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
        }
        .nav-btn.active {
            background: #24ffa4;
            color: #0b0e14;
        }
        .main-content {
            padding: 32px 40px;
        }
        .search-box {
            margin-bottom: 32px;
            max-width: 340px;
        }
        .search-box input {
            width: 100%;
            background: #141a24;
            border: 1px solid #2a333d;
            padding: 12px 20px;
            border-radius: 40px;
            color: white;
        }
        .nft-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 28px;
        }
        .nft-card {
            background: #11161f;
            border: 1px solid #232a33;
            border-radius: 24px;
            padding: 20px;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .avatar {
            width: 38px;
            height: 38px;
            background: #202731;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #24ffa4;
        }
        .likes {
            color: #24ffa4;
            background: rgba(36,255,164,0.1);
            padding: 4px 10px;
            border-radius: 30px;
        }
        .card-img {
            width: 100%;
            aspect-ratio: 1/1;
            background-size: cover;
            background-position: center;
            border-radius: 20px;
            margin-bottom: 16px;
        }
        .collection-label {
            font-size: 11px;
            color: #6b7c8f;
            text-transform: uppercase;
        }
        .nft-title {
            font-size: 18px;
            font-weight: 700;
            margin: 6px 0 16px;
        }
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #232a33;
            padding-top: 12px;
        }
        .price {
            font-size: 20px;
            font-weight: 800;
            color: #24ffa4;
        }
        .btn-buy {
            background: transparent;
            border: 1px solid #24ffa4;
            color: #24ffa4;
            padding: 6px 20px;
            border-radius: 40px;
            cursor: pointer;
        }
        .page {
            display: none;
        }
        .page.active-page {
            display: block;
        }
        input, textarea {
            width: 100%;
            background: #0f131c;
            border: 1px solid #2a333d;
            padding: 12px;
            border-radius: 16px;
            color: white;
        }
        .btn-primary {
            background: #24ffa4;
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
        }
        .auth-card {
            max-width: 440px;
            margin: 40px auto;
            background: #11161f;
            padding: 40px;
            border-radius: 28px;
        }
        .form-group {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
<div class="navbar">
    <div class="logo">NFT MARKET</div>
    <button class="nav-btn active" onclick="showPage('nfts')">NFT's</button>
    <button class="nav-btn" onclick="showPage('login')">Login/Register</button>
    <button class="nav-btn" onclick="showPage('profile')">Profile</button>
    <button class="nav-btn" onclick="showPage('my-nfts')">My NFT's</button>
    <button class="nav-btn" onclick="showPage('create')">Create nft</button>
</div>
<div class="main-content">
    <div id="nfts" class="page active-page">
        <div class="search-box"><input type="text" id="searchInput" placeholder="Search"></div>
        <div class="nft-grid" id="nftGrid"></div>
    </div>
    <div id="login" class="page">
        <div class="auth-card">
            <div id="loginForm">
                <h3 style="color:#24ffa4">Войти в аккаунт</h3>
                <div class="form-group"><label>Имя пользователя</label><input type="text" id="loginName"></div>
                <div class="form-group"><label>Пароль</label><input type="password" id="loginPassword"></div>
                <button class="btn-primary" onclick="login()">Войти</button>
                <div style="text-align:center; margin-top:20px"><a onclick="showRegister()" style="color:#24ffa4; cursor:pointer">Зарегистрироваться</a></div>
            </div>
            <div id="registerForm" style="display:none">
                <h3 style="color:#24ffa4">Регистрация</h3>
                <div class="form-group"><label>Имя</label><input type="text" id="regName"></div>
                <div class="form-group"><label>Email</label><input type="email" id="regEmail"></div>
                <div class="form-group"><label>Пароль</label><input type="password" id="regPassword"></div>
                <button class="btn-primary" onclick="register()">Зарегистрироваться</button>
                <div style="text-align:center; margin-top:20px"><a onclick="showLogin()" style="color:#24ffa4; cursor:pointer">Войти</a></div>
            </div>
        </div>
    </div>
    <div id="profile" class="page">
        <div class="auth-card" style="max-width:500px">
            <h3 style="color:#24ffa4">Профиль</h3>
            <div class="form-group"><label>Имя</label><input type="text" id="profileName"></div>
            <div class="form-group"><label>Email</label><input type="email" id="profileEmail"></div>
            <div class="form-group"><label>О себе</label><textarea rows="3" id="profileBio"></textarea></div>
            <button class="btn-primary" onclick="saveProfile()">Сохранить</button>
        </div>
    </div>
    <div id="my-nfts" class="page">
        <h2 style="color:#24ffa4">Мои NFT</h2>
        <div class="nft-grid" id="myNftsGrid"></div>
    </div>
    <div id="create" class="page">
        <div class="auth-card" style="max-width:500px">
            <h3 style="color:#24ffa4">Создать NFT</h3>
            <div class="form-group"><label>Название</label><input type="text" id="nftName"></div>
            <div class="form-group"><label>Цена</label><input type="text" id="nftPrice"></div>
            <div class="form-group"><label>Ссылка на картинку</label><input type="text" id="nftImage"></div>
            <button class="btn-primary" onclick="createNFT()">Создать</button>
        </div>
    </div>
</div>
<script>
    let nfts = [
        { creator: "KKSpecial", likes: 43, title: "Nightmare (pt.15)", price: "49.99", img: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=400&h=400&fit=crop" },
        { creator: "MorugaNFT", likes: 88, title: "King Bored Ape", price: "49.99", img: "https://images.unsplash.com/photo-1634017839464-5c339ebe3cb4?w=400&h=400&fit=crop" },
        { creator: "User-71068", likes: 24, title: "HorseNFT #1332", price: "49.99", img: "https://images.unsplash.com/photo-1614741118887-7a4ee193a5fa?w=400&h=400&fit=crop" },
        { creator: "Angelina2022", likes: 93, title: "USSR 2.Edition", price: "49.99", img: "https://images.unsplash.com/photo-1620641788421-7a1c342ea42e?w=400&h=400&fit=crop" }
    ];
    let myNFTs = [];
    let currentUser = null;

    function renderNFTs() {
        let container = document.getElementById('nftGrid');
        if(!container) return;
        container.innerHTML = nfts.map(n => `
            <div class="nft-card">
                <div class="card-header">
                    <div class="user-info"><div class="avatar">⚪</div><span>${n.creator}</span></div>
                    <div class="likes">▼ ${n.likes}</div>
                </div>
                <div class="card-img" style="background-image: url('${n.img}')"></div>
                <div class="collection-label">COLLECTION NAME</div>
                <div class="nft-title">${n.title}</div>
                <div class="card-footer"><span class="price">$${n.price}</span><button class="btn-buy" onclick='buyNFT(${JSON.stringify(n).replace(/'/g,"\\'")})'>Buy</button></div>
            </div>
        `).join('');
    }
    function renderMyNFTs() {
        let container = document.getElementById('myNftsGrid');
        if(!container) return;
        if(myNFTs.length === 0) { container.innerHTML = '<div style="text-align:center; padding:50px; color:#8e9eae">У вас пока нет NFT</div>'; return; }
        container.innerHTML = myNFTs.map(n => `
            <div class="nft-card">
                <div class="card-header"><div class="user-info"><div class="avatar">⚪</div><span>${n.creator}</span></div><div class="likes">▼ 0</div></div>
                <div class="card-img" style="background-image: url('${n.img}')"></div>
                <div class="collection-label">COLLECTION NAME</div>
                <div class="nft-title">${n.title}</div>
                <div class="card-footer"><span class="price">$${n.price}</span></div>
            </div>
        `).join('');
    }
    function buyNFT(n) { if(!currentUser) { alert('Войдите'); showPage('login'); return; } myNFTs.push({...n, creator: currentUser.name}); renderMyNFTs(); alert('Куплено!'); }
    function createNFT() { if(!currentUser) { alert('Войдите'); showPage('login'); return; } let name=document.getElementById('nftName').value, price=document.getElementById('nftPrice').value, img=document.getElementById('nftImage').value; if(!name||!price||!img){alert('Заполните все'); return;} myNFTs.push({creator:currentUser.name, title:name, price:price, img:img}); alert('Создан!'); renderMyNFTs(); }
    function showRegister() { document.getElementById('loginForm').style.display='none'; document.getElementById('registerForm').style.display='block'; }
    function showLogin() { document.getElementById('loginForm').style.display='block'; document.getElementById('registerForm').style.display='none'; }
    function register() { let name=document.getElementById('regName').value, email=document.getElementById('regEmail').value, pass=document.getElementById('regPassword').value; if(!name||!email||!pass){alert('Заполните'); return;} if(pass.length<4){alert('Пароль минимум 4'); return;} let user={name,email,password:pass}; localStorage.setItem('nft_user',JSON.stringify(user)); currentUser=user; alert('Регистрация успешна'); updateProfile(); showPage('profile'); }
    function login() { let name=document.getElementById('loginName').value, pass=document.getElementById('loginPassword').value; let saved=localStorage.getItem('nft_user'); if(!saved){alert('Сначала зарегистрируйтесь'); return;} let user=JSON.parse(saved); if(user.name===name && user.password===pass){ currentUser=user; alert('Добро пожаловать'); updateProfile(); showPage('profile'); } else { alert('Неверно'); } }
    function updateProfile() { if(currentUser){ document.getElementById('profileName').value=currentUser.name||''; document.getElementById('profileEmail').value=currentUser.email||''; document.getElementById('profileBio').value=currentUser.bio||''; } }
    function saveProfile() { if(!currentUser){alert('Войдите'); return;} currentUser.name=document.getElementById('profileName').value; currentUser.email=document.getElementById('profileEmail').value; currentUser.bio=document.getElementById('profileBio').value; localStorage.setItem('nft_user',JSON.stringify(currentUser)); alert('Сохранено'); }
    function showPage(pageId) { document.querySelectorAll('.page').forEach(p=>p.classList.remove('active-page')); document.getElementById(pageId).classList.add('active-page'); document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active')); event.target.classList.add('active'); if(pageId==='my-nfts') renderMyNFTs(); }
    let saved=localStorage.getItem('nft_user'); if(saved){ currentUser=JSON.parse(saved); updateProfile(); }
    renderNFTs();
</script>
</body>
</html>
