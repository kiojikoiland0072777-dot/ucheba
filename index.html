<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFT Market | Premium Crypto Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: #0a0a0f;
            color: #ffffff;
        }

        .app {
            display: flex;
            min-height: 100vh;
        }

        /* Сайдбар */
        .sidebar {
            width: 280px;
            background: #0f0f18;
            border-right: 1px solid #1e1e2e;
            padding: 40px 24px;
            position: fixed;
            height: 100vh;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 48px;
        }

        .nav-btn {
            display: block;
            width: 100%;
            padding: 14px 20px;
            margin-bottom: 8px;
            background: transparent;
            border: none;
            color: #8888aa;
            font-size: 15px;
            font-weight: 500;
            text-align: left;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-btn:hover {
            background: #1a1a2e;
            color: #ffffff;
        }

        .nav-btn.active {
            background: #00ff88;
            color: #0a0a0f;
            font-weight: 600;
        }

        /* Негізгі контент */
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 48px 56px;
        }

        /* Беттер */
        .page {
            display: none;
        }

        .page.active-page {
            display: block;
        }

        h2 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 32px;
            color: #ffffff;
        }

        h2 span {
            color: #00ff88;
        }

        /* NFT сетка */
        .nft-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        .nft-card {
            background: #111118;
            border: 1px solid #1e1e2e;
            border-radius: 20px;
            padding: 16px;
            transition: all 0.3s;
        }

        .nft-card:hover {
            transform: translateY(-5px);
            border-color: #00ff88;
        }

        .card-img {
            width: 100%;
            height: 240px;
            border-radius: 16px;
            background-size: cover;
            background-position: center;
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .card-creator {
            font-size: 13px;
            color: #666;
            margin-bottom: 12px;
        }

        .card-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .price {
            font-size: 20px;
            font-weight: 700;
            color: #00ff88;
        }

        .btn-buy {
            background: #1a1a2e;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            color: #fff;
            cursor: pointer;
        }

        .btn-buy:hover {
            background: #00ff88;
            color: #0a0a0f;
        }

        /* Формалар */
        .form-container {
            max-width: 500px;
            background: #111118;
            padding: 32px;
            border-radius: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #888;
        }

        input, textarea {
            width: 100%;
            background: #0a0a0f;
            border: 1px solid #1e1e2e;
            padding: 12px;
            border-radius: 12px;
            color: #fff;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #00ff88;
        }

        .btn-primary {
            background: #00ff88;
            border: none;
            padding: 12px 28px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }

        .auth-card {
            max-width: 450px;
            margin: 0 auto;
            background: #111118;
            padding: 48px;
            border-radius: 28px;
            text-align: center;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            background: #111118;
            border-radius: 24px;
            color: #666;
        }
    </style>
</head>
<body>

<div class="app">
    <aside class="sidebar">
        <div class="logo">NFT.MARKET</div>
        <button class="nav-btn active" onclick="showPage('nfts')">🎨 NFT's</button>
        <button class="nav-btn" onclick="showPage('login')">🔐 Login</button>
        <button class="nav-btn" onclick="showPage('profile')">👤 Profile</button>
        <button class="nav-btn" onclick="showPage('my-nfts')">🖼️ My NFT's</button>
        <button class="nav-btn" onclick="showPage('create')">✨ Create NFT</button>
    </aside>

    <main class="main-content">
        
        <div id="nfts" class="page active-page">
            <h2>NFT <span>Collections</span></h2>
            <div class="nft-grid" id="nftGrid"></div>
        </div>

        <div id="login" class="page">
            <div class="auth-card">
                <h3>Welcome Back</h3>
                <p style="margin-bottom: 32px; color:#666;">Sign in to your account</p>
                <div class="form-group"><input type="text" placeholder="Username"></div>
                <div class="form-group"><input type="password" placeholder="Password"></div>
                <button class="btn-primary">Sign In</button>
            </div>
        </div>

        <div id="profile" class="page">
            <h2>Edit <span>Profile</span></h2>
            <div class="form-container">
                <div class="form-group"><label>Username</label><input type="text" placeholder="crypto_artist"></div>
                <div class="form-group"><label>Bio</label><textarea rows="4" placeholder="Tell about yourself..."></textarea></div>
                <button class="btn-primary">Save</button>
            </div>
        </div>

        <div id="my-nfts" class="page">
            <h2>My <span>Collection</span></h2>
            <div class="empty-state"><p>You don't have any NFTs yet</p><p style="font-size:13px;">Go to Create NFT to mint your first piece!</p></div>
        </div>

        <div id="create" class="page">
            <h2>Create <span>New NFT</span></h2>
            <div class="form-container">
                <div class="form-group"><label>NFT Name</label><input type="text" placeholder="Cyber Punk #001"></div>
                <div class="form-group"><label>Description</label><textarea rows="4" placeholder="Describe your artwork..."></textarea></div>
                <div class="form-group"><label>Price (USD)</label><input type="text" placeholder="0.00"></div>
                <button class="btn-primary">Mint NFT</button>
            </div>
        </div>

    </main>
</div>

<script>
    const nfts = [
        { name: "Nightmare (pt.15)", creator: "KKSpecial", price: "49.99", img: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=400&h=400&fit=crop" },
        { name: "King Bored Ape", creator: "MorugaNFT", price: "49.99", img: "https://images.unsplash.com/photo-1634017839464-5c339ebe3cb4?w=400&h=400&fit=crop" },
        { name: "HorseNFT #1332", creator: "User-71068", price: "49.99", img: "https://images.unsplash.com/photo-1614741118887-7a4ee193a5fa?w=400&h=400&fit=crop" },
        { name: "USSR 2.Edition", creator: "Angelina2022", price: "49.99", img: "https://images.unsplash.com/photo-1620641788421-7a1c342ea42e?w=400&h=400&fit=crop" },
        { name: "Cosmic Dreamer", creator: "SpaceArt", price: "39.99", img: "https://images.unsplash.com/photo-1541701494587-cb58502866ab?w=400&h=400&fit=crop" },
        { name: "Neon Punk", creator: "CyberLord", price: "59.99", img: "https://images.unsplash.com/photo-1639762681485-074b7f938ba0?w=400&h=400&fit=crop" }
    ];

    function renderNFTs() {
        const grid = document.getElementById('nftGrid');
        if (!grid) return;
        grid.innerHTML = nfts.map(nft => `
            <div class="nft-card">
                <div class="card-img" style="background-image: url('${nft.img}')"></div>
                <div class="card-title">${nft.name}</div>
                <div class="card-creator">by ${nft.creator}</div>
                <div class="card-bottom">
                    <span class="price">$${nft.price}</span>
                    <button class="btn-buy" onclick="alert('✅ Demo: NFT purchased!')">Buy</button>
                </div>
            </div>
        `).join('');
    }

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(page => page.classList.remove('active-page'));
        document.getElementById(pageId).classList.add('active-page');
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
    }

    renderNFTs();
</script>

</body>
</html>
