<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFT Market</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', sans-serif;
        }
        body {
            background: #0a0a0f;
            color: white;
        }
        .navbar {
            background: #111118;
            padding: 16px 40px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            border-bottom: 1px solid #2a2f4a;
        }
        .logo {
            font-size: 22px;
            font-weight: bold;
            color: #4a7cff;
            margin-right: auto;
        }
        .nav-btn {
            background: transparent;
            border: 1px solid #4a7cff;
            color: #4a7cff;
            padding: 10px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
        }
        .nav-btn.active {
            background: #4a7cff;
            color: white;
        }
        .main-content {
            padding: 40px;
        }
        .page {
            display: none;
        }
        .page.active-page {
            display: block;
        }
        h2 {
            color: #4a7cff;
            margin-bottom: 24px;
        }
        .nft-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }
        .nft-card {
            background: #111118;
            border: 1px solid #2a2f4a;
            border-radius: 16px;
            padding: 16px;
        }
        .card-img {
            width: 100%;
            height: 220px;
            border-radius: 12px;
            background-size: cover;
            background-position: center;
            margin-bottom: 12px;
        }
        .price {
            color: #4a7cff;
            font-size: 20px;
            font-weight: bold;
        }
        .btn-buy {
            background: #2a2f4a;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
        }
        input, textarea {
            width: 100%;
            background: #111118;
            border: 1px solid #2a2f4a;
            padding: 12px;
            border-radius: 12px;
            color: white;
            margin-bottom: 16px;
        }
        .btn-primary {
            background: #4a7cff;
            border: none;
            padding: 12px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            width: 100%;
        }
        .auth-card {
            max-width: 400px;
            margin: 0 auto;
            background: #111118;
            padding: 40px;
            border-radius: 24px;
        }
        .empty-state {
            text-align: center;
            padding: 60px;
            color: #666;
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="logo">NFT MARKET</div>
    <button class="nav-btn active" onclick="showPage('nfts')">NFT's</button>
    <button class="nav-btn" onclick="showPage('login')">Login</button>
    <button class="nav-btn" onclick="showPage('profile')">Profile</button>
    <button class="nav-btn" onclick="showPage('my-nfts')">My NFT's</button>
    <button class="nav-btn" onclick="showPage('create')">Create NFT</button>
</div>

<div class="main-content">
    <div id="nfts" class="page active-page">
        <h2>NFT Collections</h2>
        <div class="nft-grid" id="nftGrid"></div>
    </div>

    <div id="login" class="page">
        <div class="auth-card">
            <h2>Welcome Back</h2>
            <input type="text" placeholder="Username">
            <input type="password" placeholder="Password">
            <button class="btn-primary">Sign In</button>
        </div>
    </div>

    <div id="profile" class="page">
        <h2>Edit Profile</h2>
        <div style="max-width: 500px;">
            <input type="text" placeholder="Username">
            <textarea rows="4" placeholder="Bio"></textarea>
            <button class="btn-primary">Save Changes</button>
        </div>
    </div>

    <div id="my-nfts" class="page">
        <h2>My NFTs</h2>
        <div class="empty-state">✨ You don't have any NFTs yet</div>
    </div>

    <div id="create" class="page">
        <h2>Create New NFT</h2>
        <div style="max-width: 500px;">
            <input type="text" placeholder="NFT Name">
            <textarea rows="4" placeholder="Description"></textarea>
            <input type="text" placeholder="Price (USD)">
            <button class="btn-primary">Mint NFT</button>
        </div>
    </div>
</div>

<script>
    const nfts = [
        { name: "Nightmare (pt.15)", price: "49.99", img: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=400&h=400&fit=crop" },
        { name: "King Bored Ape", price: "49.99", img: "https://images.unsplash.com/photo-1634017839464-5c339ebe3cb4?w=400&h=400&fit=crop" },
        { name: "HorseNFT #1332", price: "49.99", img: "https://images.unsplash.com/photo-1614741118887-7a4ee193a5fa?w=400&h=400&fit=crop" },
        { name: "USSR 2.Edition", price: "49.99", img: "https://images.unsplash.com/photo-1620641788421-7a1c342ea42e?w=400&h=400&fit=crop" },
        { name: "Cosmic Dreamer", price: "39.99", img: "https://images.unsplash.com/photo-1541701494587-cb58502866ab?w=400&h=400&fit=crop" },
        { name: "Neon Punk", price: "59.99", img: "https://images.unsplash.com/photo-1639762681485-074b7f938ba0?w=400&h=400&fit=crop" }
    ];

    function renderNFTs() {
        const grid = document.getElementById('nftGrid');
        if(grid) {
            grid.innerHTML = nfts.map(n => `
                <div class="nft-card">
                    <div class="card-img" style="background-image: url('${n.img}')"></div>
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 12px;">
                        <span class="price">$${n.price}</span>
                        <button class="btn-buy" onclick="alert('✅ NFT purchased! (Demo)')">Buy</button>
                    </div>
                </div>
            `).join('');
        }
    }

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(pageId).classList.add('active-page');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
    }

    renderNFTs();
</script>

</body>
</html>
